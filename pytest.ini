[pytest]
# The package lives under python/loom, not at the repo root, so `loom` is not
# importable from a bare `python3 -m pytest` invocation. The `pythonpath` ini
# option (pytest >= 7) prepends `python/` to sys.path during collection, so the
# suite runs from the repo root with NO manual PYTHONPATH. This is additive: the
# CI invocation `PYTHONPATH=python python -m pytest -q` keeps working unchanged.
pythonpath = python
