name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # wicked-loom is a hybrid: a Python 3 stdlib core (the compose surface) shipped
  # inside an npm package via a Node bin shim. The real test suite is pytest; the
  # Node side only needs a pack sanity check.
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
      # The package is stdlib-only; pytest is the sole *dev* dependency (the
      # test suite uses its fixtures). Install it before running the suite.
      - name: Install test deps
        run: python -m pip install --upgrade pip pytest
      - name: Run the test suite
        run: PYTHONPATH=python python -m pytest -q

  # Control-plane smoke: walk a real flow-def end-to-end at the CLI boundary in
  # --dry-run, with NO peer installed. This proves loom's deterministic control
  # plane (A9) runs without a real vault/bus — the dependency-injected pytest
  # suite covers the logic, but this asserts the *spine* runs at the CLI surface
  # (the gap the existing `npm pack --dry-run` packaging check never closed).
  # node is set up so `npx` resolves peers via the ladder; the dry-run stub
  # answers the gate so nothing real is spawned, and the flow parks at the hard
  # gate -> exit 0.
  control-plane-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
      - name: Flow control-plane dry-run (no peer installed)
        run: PYTHONPATH=python python -m loom flow run examples/flow-def.json --dry-run

  # Prove the shipped npm package packs cleanly (correct files allowlist, no
  # test/pycache leakage). Pure ESM bin shim — no native deps.
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
      - name: npm pack sanity
        run: npm pack --dry-run
